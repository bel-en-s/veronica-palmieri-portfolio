name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install templ
        run: go install github.com/a-h/templ/cmd/templ@v0.3.1001

      - name: Generate templ
        run: templ generate

      - name: Build
        run: |
          mkdir -p dist
          go build -o dist/vero-palmieri-portfolio .

      - name: Deploy
        run: |
          DEST=~/services/vero-palmieri-portfolio
          mkdir -p $DEST/dist
          cp dist/vero-palmieri-portfolio $DEST/dist/
          cp Dockerfile docker-compose.yml $DEST/
          cd $DEST && docker compose up -d --build
